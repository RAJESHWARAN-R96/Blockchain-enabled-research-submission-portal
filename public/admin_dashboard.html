<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Research Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .stat-card {
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .chart-container {
            height: 350px;
            position: relative;
        }

        .status-badge {
            font-weight: 600;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .mono {
            font-family: 'Courier New', Courier, monospace;
        }

        .stat-card-danger {
            background-color: #dc3545 !important;
            color: white !important;
            border: 2px solid #ff0000;
            box-shadow: 0 0 15px rgba(220, 53, 69, 0.5);
            animation: blink 1s infinite;
        }

        .bg-red {
            background-color: #991b1b !important; /* Deep Secure Red */
            color: white !important;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        .blink {
            animation: blink 0.8s infinite;
        }

        #alertIcon {
            font-size: 1.5rem;
            margin-right: 10px;
        }
    </style>
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fas fa-layer-group me-2"></i>ResearchPortal - Admin</a>
            <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row mb-5">
            <!-- Stats Cards -->
            <div class="col-md-3">
                <div class="card stat-card text-center p-3 shadow-sm border-0 bg-primary text-white">
                    <h6 class="text-uppercase small-text opacity-75">Total Submissions</h6>
                    <h2 id="stat-total" class="mb-0">0</h2>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card text-center p-3 shadow-sm border-0 bg-success text-white">
                    <h6 class="text-uppercase small-text opacity-75">Approved</h6>
                    <h2 id="stat-approved" class="mb-0">0</h2>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card text-center p-3 shadow-sm border-0 bg-warning text-dark">
                    <h6 class="text-uppercase small-text opacity-75">Pending Reviews</h6>
                    <h2 id="stat-pending" class="mb-0">0</h2>
                </div>
            </div>
            <div class="col-md-3">
                <div id="tamperCard" class="card stat-card text-center p-3 shadow-sm border bg-red text-white">
                    <div class="d-flex justify-content-center align-items-center mb-1">
                        <svg id="alertIcon" class="d-none me-2 blink" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
                        <h6 class="text-uppercase small-text opacity-75 mb-0">Security Alerts</h6>
                    </div>
                    <h2 id="stat-tampered" class="text-white mb-0">0</h2>
                </div>
            </div>
        </div>

        <div class="row mb-5">
            <!-- Charts Section -->
            <div class="col-md-8">
                <div class="card p-4 shadow-sm border-0 chart-container">
                    <h5 class="card-title mb-4">Submission Trends (Monthly)</h5>
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-4 shadow-sm border-0 chart-container">
                    <h5 class="card-title mb-4">Status Breakdown</h5>
                    <canvas id="statusChart"></canvas>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Detailed Records</h2>
            <div id="healthBadge" class="badge rounded-pill bg-light text-dark border p-2 px-3 shadow-xs">
                <i class="fas fa-shield-alt text-success me-1"></i> 
                Blockchain Health: <span id="healthScore">---</span>
            </div>
        </div>
        <div class="card p-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>Student</th>
                            <th>Title</th>
                            <th>File</th>
                            <th>Hash (Blockchain ID)</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="adminTable">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="verifyModal" tabindex="-1">
        <div class="modal-dialog text-dark">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Integrity Verification</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p><strong>System Message:</strong></p>
                    <div id="verifyResult" class="alert"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="confirmModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-body text-center p-4">
                    <h5 class="mb-3">Are you sure?</h5>
                    <p id="confirmMessage" class="text-muted small"></p>
                    <div class="d-flex justify-content-center gap-2 mt-4">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" id="confirmBtn" class="btn btn-primary px-4">Confirm</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/admin.js"></script>
</body>

</html>
